# Docker Compose configuration for Freight Router v0
name: freight-router-v0

services:
  osrm_download:
    image: curlimages/curl:8.7.1
    container_name: freight_osrm_download
    restart: 'no'
    env_file: .env
    environment:
      REGION_PBF_URL: ${REGION_PBF_URL:?Set REGION_PBF_URL in .env}
    volumes:
      - ./osrm/data/pbf:/data/pbf
      - ./osrm/scripts:/scripts:ro
    command: ['sh', '/scripts/download_pbf.sh']

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v6.0.0
    container_name: freight_osrm
    env_file: .env
    environment:
      REGION_PBF_URL: ${REGION_PBF_URL:?Set REGION_PBF_URL in .env}
    depends_on:
      osrm_download:
        condition: service_completed_successfully
    ports:
      - '5000:5000'
    volumes:
      - ./osrm/data/pbf:/data/pbf
      - ./osrm/data/osrm:/data/osrm
      - ./osrm/profiles:/profiles:ro
      - ./osrm/scripts:/scripts:ro
    command: ['sh', '/scripts/run_osrm.sh']

  osrm_ready:
    image: curlimages/curl:8.7.1
    container_name: freight_osrm_ready
    restart: 'no'
    depends_on:
      osrm:
        condition: service_started
    environment:
      # Ensure internal curl checks never go via a corporate proxy.
      NO_PROXY: osrm,localhost,127.0.0.1
      no_proxy: osrm,localhost,127.0.0.1
    command: >
      sh -c 'echo "Waiting for OSRM on :5000..."; until curl -sS http://osrm:5000/ >/dev/null; do sleep 2; done; echo "OSRM is up."'

  ors:
    image: openrouteservice/openrouteservice:v9.7.1
    container_name: freight_ors
    environment:
      ORS_CONFIG_LOCATION: /home/ors/config/ors-config.yml
      REBUILD_GRAPHS: "False"
      XMS: 2g
      XMX: 6g
      NO_PROXY: osrm,ors,localhost,127.0.0.1
      no_proxy: osrm,ors,localhost,127.0.0.1
    ports:
      - '8082:8082'
    volumes:
      - ./osrm/data/pbf:/home/ors/files:ro
      - ./ors/data:/home/ors/graphs
      - ./ors/config:/home/ors/config:ro
      - ./ors/logs:/home/ors/logs
    depends_on:
      osrm_download:
        condition: service_completed_successfully

  ors_ready:
    image: curlimages/curl:8.7.1
    container_name: freight_ors_ready
    restart: 'no'
    depends_on:
      ors:
        condition: service_started
    environment:
      NO_PROXY: ors,localhost,127.0.0.1
      no_proxy: ors,localhost,127.0.0.1
    command: >
      sh -c 'echo "Waiting for ORS on :8082..."; until curl -sS http://ors:8082/ors/v2/health >/dev/null; do sleep 5; done; echo "ORS is up."'

  backend:
    build:
      context: ./backend
    container_name: freight_backend
    environment:
      OSRM_BASE_URL: http://osrm:5000
      ORS_BASE_URL: http://ors:8082/ors
      OUT_DIR: /app/out
      LOG_LEVEL: INFO
      # Ensure backend -> OSRM calls never go via a corporate proxy.
      NO_PROXY: osrm,ors,localhost,127.0.0.1
      no_proxy: osrm,ors,localhost,127.0.0.1
      # CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend/out:/app/out
    ports:
      - '8000:8000'
    depends_on:
      osrm_ready:
        condition: service_completed_successfully
      ors_ready:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    container_name: freight_frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_started
